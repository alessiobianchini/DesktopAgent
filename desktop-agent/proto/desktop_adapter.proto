syntax = "proto3";

option csharp_namespace = "DesktopAgent.Proto";

package desktopagent;

message Empty {}

message Rect {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message WindowRef {
  string id = 1;
  string title = 2;
  string appId = 3;
  Rect bounds = 4;
}

message WindowList {
  repeated WindowRef windows = 1;
}

message ElementRef {
  string id = 1;
  string role = 2;
  string name = 3;
  string automationId = 4;
  string className = 5;
  Rect bounds = 6;
  string pathHints = 7;
}

message ElementList {
  repeated ElementRef elements = 1;
}

message UiNode {
  string id = 1;
  string role = 2;
  string name = 3;
  string automationId = 4;
  string className = 5;
  Rect bounds = 6;
  repeated UiNode children = 7;
}

message UiTree {
  WindowRef window = 1;
  UiNode root = 2;
}

message Selector {
  string role = 1;
  string nameContains = 2;
  string automationId = 3;
  string className = 4;
  string ancestorNameContains = 5;
  int32 index = 6;
  Rect boundsHint = 7;
  string windowId = 8;
}

message WindowRequest {
  string windowId = 1;
}

message FindRequest {
  Selector selector = 1;
}

message ElementRequest {
  string elementId = 1;
}

message SetValueRequest {
  string elementId = 1;
  string value = 2;
}

message ClickRequest {
  int32 x = 1;
  int32 y = 2;
}

message TypeTextRequest {
  string text = 1;
}

message KeyComboRequest {
  repeated string keys = 1;
}

message OpenAppRequest {
  string appIdOrPath = 1;
}

message ScreenshotRequest {
  Rect region = 1;
  string windowId = 2;
}

message ScreenshotResponse {
  bytes png = 1;
  int32 width = 2;
  int32 height = 3;
}

message ClipboardResponse {
  string text = 1;
}

message SetClipboardRequest {
  string text = 1;
}

message ArmRequest {
  bool requireUserPresence = 1;
}

message Status {
  bool armed = 1;
  bool requireUserPresence = 2;
  string message = 3;
}

message ActionResult {
  bool success = 1;
  string message = 2;
}

service DesktopAdapter {
  rpc GetActiveWindow(Empty) returns (WindowRef);
  rpc ListWindows(Empty) returns (WindowList);
  rpc GetUiTree(WindowRequest) returns (UiTree);
  rpc FindElements(FindRequest) returns (ElementList);
  rpc InvokeElement(ElementRequest) returns (ActionResult);
  rpc SetElementValue(SetValueRequest) returns (ActionResult);
  rpc ClickPoint(ClickRequest) returns (ActionResult);
  rpc TypeText(TypeTextRequest) returns (ActionResult);
  rpc KeyCombo(KeyComboRequest) returns (ActionResult);
  rpc OpenApp(OpenAppRequest) returns (ActionResult);
  rpc CaptureScreen(ScreenshotRequest) returns (ScreenshotResponse);
  rpc GetClipboard(Empty) returns (ClipboardResponse);
  rpc SetClipboard(SetClipboardRequest) returns (ActionResult);
  rpc Arm(ArmRequest) returns (Status);
  rpc Disarm(Empty) returns (Status);
  rpc GetStatus(Empty) returns (Status);
}
