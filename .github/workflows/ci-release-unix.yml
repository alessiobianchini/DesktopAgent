name: CI + Unix Packages

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-unix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Package
            runner: ubuntu-latest
            script: ./scripts/publish-linux.sh
            artifact: desktop-agent-linux-x64
            path: dist/linux-x64/**
          - name: macOS Package
            runner: macos-latest
            script: ./scripts/publish-macos.sh
            artifact: desktop-agent-macos
            path: dist/macos/**

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build package
        shell: bash
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
