name: CI + Windows Package

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      build_installer:
        description: "Build Inno Setup installer"
        required: false
        default: false
        type: boolean
      version:
        description: "Installer version (used when build_installer=true)"
        required: false
        default: "0.1.0"
        type: string

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore DesktopAgentSolution.sln

      - name: Build
        run: dotnet build DesktopAgentSolution.sln -c Release --no-restore

      - name: Test
        run: dotnet test core/DesktopAgent.Tests/DesktopAgent.Tests.csproj -c Release --no-build

      - name: Publish Windows package
        shell: pwsh
        run: |
          ./scripts/publish-windows.ps1 -Configuration Release -SkipTests -OutputRoot dist/win-x64

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-agent-win-x64
          path: dist/win-x64/**
          if-no-files-found: error

      - name: Install Inno Setup
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_installer == true }}
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_installer == true }}
        shell: pwsh
        run: |
          ./scripts/build-installer.ps1 -SkipPublish -Version "${{ inputs.version }}"

      - name: Upload installer artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_installer == true }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-agent-installer
          path: dist/installer/*.exe
          if-no-files-found: error
