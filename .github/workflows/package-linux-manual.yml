name: Package Linux (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build package
        shell: bash
        run: ./scripts/publish-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-agent-linux-x64
          path: dist/linux-x64/**
          if-no-files-found: error
