name: Release (GitHub)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.0)"
        required: true
        default: "v0.1.0"
        type: string
      version:
        description: "Version label (optional, default: tag without v)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag/version
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}".Trim()
            $version = "${{ inputs.version }}".Trim()
            if ([string]::IsNullOrWhiteSpace($version)) {
              $version = $tag.TrimStart('v', 'V')
            }
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart('v', 'V')
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore DesktopAgentSolution.sln

      - name: Build
        run: dotnet build DesktopAgentSolution.sln -c Release --no-restore

      - name: Test
        run: dotnet test core/DesktopAgent.Tests/DesktopAgent.Tests.csproj -c Release --no-build

      - name: Publish portable package
        shell: pwsh
        run: |
          ./scripts/publish-windows.ps1 -Configuration Release -SkipTests -OutputRoot dist/win-x64 -Version "${{ steps.meta.outputs.version }}"

      - name: Build Velopack package
        shell: pwsh
        run: |
          ./scripts/package-velopack-windows.ps1 `
            -Configuration Release `
            -Version "${{ steps.meta.outputs.version }}" `
            -SkipTests

      - name: Validate Velopack assets
        shell: pwsh
        run: |
          $feedDir = "dist/velopack-win-x64/releases"
          $releasesFile = Join-Path $feedDir "RELEASES"
          if (-not (Test-Path $releasesFile)) {
            throw "Missing Velopack RELEASES file: $releasesFile"
          }

          $packages = Get-ChildItem -Path $feedDir -Filter "*.nupkg" -File -ErrorAction SilentlyContinue
          if (-not $packages -or $packages.Count -eq 0) {
            throw "Missing Velopack packages (*.nupkg) in $feedDir"
          }

          Write-Host "Velopack feed OK:"
          Write-Host " - $releasesFile"
          $packages | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Normalize RELEASES encoding (UTF-8 no BOM)
        shell: pwsh
        run: |
          $releasesFile = "dist/velopack-win-x64/releases/RELEASES"
          $content = Get-Content -Path $releasesFile -Raw
          [System.IO.File]::WriteAllText($releasesFile, $content, [System.Text.UTF8Encoding]::new($false))

      - name: Prepare code signing certificate
        id: codesign_cert
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:CODESIGN_PASSWORD)) {
            Write-Host "Code signing secrets not configured. Signing steps will be skipped."
            "path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $certDir = Join-Path $env:RUNNER_TEMP "codesign"
          New-Item -ItemType Directory -Path $certDir -Force | Out-Null
          $certPath = Join-Path $certDir "codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))
          "path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sign portable executables
        if: ${{ steps.codesign_cert.outputs.path != '' }}
        shell: pwsh
        env:
          CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          ./scripts/sign-windows.ps1 `
            -CertPath "${{ steps.codesign_cert.outputs.path }}" `
            -CertPassword "$env:CODESIGN_PASSWORD" `
            -InputRoot "dist/win-x64"

      - name: Zip portable package
        id: portable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/release -Force | Out-Null
          $zipPath = "dist/release/DesktopAgent-win-x64-${{ steps.meta.outputs.version }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path dist/win-x64/* -DestinationPath $zipPath -CompressionLevel Optimal
          "zip=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_GITHUB_TOKEN != '' && secrets.RELEASE_GITHUB_TOKEN || github.token }}
          tag_name: ${{ steps.meta.outputs.tag }}
          name: DesktopAgent ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.portable.outputs.zip }}
            dist/velopack-win-x64/releases/RELEASES
            dist/velopack-win-x64/releases/*.nupkg
            dist/velopack-win-x64/releases/*Setup*.exe

      - name: Validate published update feed
        shell: pwsh
        run: |
          function Get-FeedTextWithRetry {
            param(
              [string]$Url,
              [string]$Label,
              [int]$MaxAttempts = 12,
              [int]$DelaySeconds = 10
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                $tmp = Join-Path $env:RUNNER_TEMP ("feed-" + [guid]::NewGuid().ToString("N") + ".txt")
                Invoke-WebRequest -Uri $Url -OutFile $tmp -MaximumRedirection 5 | Out-Null
                $bytes = [System.IO.File]::ReadAllBytes($tmp)
                $text = [System.Text.Encoding]::UTF8.GetString($bytes)
                Remove-Item $tmp -Force -ErrorAction SilentlyContinue

                if ($text -match "\.nupkg") {
                  Write-Host "[$Label] OK on attempt $attempt"
                  return $text
                }
              } catch {
                Write-Host "[$Label] attempt $attempt failed: $($_.Exception.Message)"
              }

              if ($attempt -lt $MaxAttempts) {
                Start-Sleep -Seconds $DelaySeconds
              }
            }

            throw "[$Label] feed validation failed for URL: $Url"
          }

          $repo = "${{ github.repository }}"
          $tag = "${{ steps.meta.outputs.tag }}"
          $tagFeedUrl = "https://github.com/$repo/releases/download/$tag/RELEASES"
          $latestFeedUrl = "https://github.com/$repo/releases/latest/download/RELEASES"

          Get-FeedTextWithRetry -Url $tagFeedUrl -Label "tag"

          if ("${{ github.event_name }}" -eq "push") {
            # On tag push, latest should resolve to the same newly published feed.
            Get-FeedTextWithRetry -Url $latestFeedUrl -Label "latest"
          } else {
            # In manual re-runs, the selected tag may not be the latest release.
            try {
              Get-FeedTextWithRetry -Url $latestFeedUrl -Label "latest" -MaxAttempts 3 -DelaySeconds 5 | Out-Null
            } catch {
              Write-Host "latest feed check skipped in workflow_dispatch: $($_.Exception.Message)"
            }
          }
